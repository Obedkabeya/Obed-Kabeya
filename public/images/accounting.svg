<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comptabilité des entreprises naissantes">
  <rect width="500" height="400" fill="#f6f8fc"/>
  <!-- rising structured blocks -->
  <g>
    <rect x="90"  y="250" width="70" height="90"  rx="4" fill="#c9d3e6"/>
    <rect x="180" y="200" width="70" height="140" rx="4" fill="#1f4f9c"/>
    <rect x="270" y="150" width="70" height="190" rx="4" fill="#0a1f44"/>
    <rect x="360" y="100" width="70" height="240" rx="4" fill="#0a1f44"/>
  </g>
  <g stroke="#fff" stroke-width="1.2" opacity="0.5">
    <line x1="90" y1="280" x2="160" y2="280"/><line x1="180" y1="240" x2="250" y2="240"/>
    <line x1="270" y1="200" x2="340" y2="200"/><line x1="360" y1="160" x2="430" y2="160"/>
    <line x1="270" y1="250" x2="340" y2="250"/><line x1="360" y1="220" x2="430" y2="220"/>
  </g>
  <path d="M70 90 L110 70 L200 105 L300 60 L440 75" fill="none" stroke="#1f4f9c" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="440" cy="75" r="5" fill="#1f4f9c"/>
</svg>
