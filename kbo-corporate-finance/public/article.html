<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Article · Obed Kabeya</title>
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="article" data-nav="ressources">
  <div id="site-header"></div>

  <section class="section">
    <div class="container">
      <div class="article" id="article">
        <p class="empty-state">Chargement…</p>
      </div>
      <div class="narrow" style="margin:3rem auto 0;text-align:center;">
        <a class="btn btn--ghost" href="ressources.html">← Retour aux ressources</a>
      </div>

      <!-- COMMENTAIRES -->
      <div class="narrow comments" style="margin:3.5rem auto 0">
        <h3>Commentaires</h3>
        <hr class="divider" />
        <div id="commentsList"><p class="muted" style="font-size:.95rem">Chargement des commentaires…</p></div>

        <div class="form-wrap" style="margin-top:2rem">
          <h4 style="margin-bottom:.8rem">Laisser un commentaire</h4>
          <form id="commentForm">
            <div class="form-grid">
              <div class="field field--full"><label for="c_msg">Votre commentaire <span class="req">*</span></label><textarea id="c_msg" name="message" maxlength="2000" required placeholder="Partagez votre réaction ou votre question."></textarea></div>
              <div class="field field--full"><label for="c_nom">Votre nom <span class="muted" style="font-weight:400">(facultatif)</span></label><input id="c_nom" name="nom" type="text" maxlength="80" placeholder="Laissez vide pour rester anonyme" /></div>
            </div>
            <div class="form-actions">
              <button class="btn btn--primary" type="submit">Publier <span class="arrow">→</span></button>
              <span class="form-msg" id="commentMsg"></span>
            </div>
            <p class="form-note">Votre commentaire est public. Le nom est facultatif — sans nom, il s'affichera « Anonyme ». Aucune adresse e-mail n'est demandée.</p>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/components.js"></script>
  <script src="js/article.js"></script>
</body>
</html>
